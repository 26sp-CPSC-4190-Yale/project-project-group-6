<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Saved Matches</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f9fc;
      margin: 0;
      color: #1f2937;
    }

    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 24px;
    }

    h1 {
      color: #2563eb;
      text-align: center;
    }

    .match-card {
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      background: #2563eb;
      color: white;
      padding: 10px 16px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      margin-top: 10px;
    }

    .btn:hover {
      background: #1d4ed8;
    }
  </style>
</head>

<body>
  <div class="container">
    <a href="{{ url_for('home') }}">← Back Home</a>

    <h1>Saved College Matches</h1>

    {% for match in matches %}
      <div class="match-card">
        <h2>{{ match.college_name }}</h2>
        <p><strong>Match Score:</strong> {{ match.match_score }}</p>

        {% if match.website %}
          <a class="btn" href="{{ match.website }}" target="_blank">Visit Website</a>
        {% endif %}
      </div>
    {% else %}
      <p>You have not saved any college matches yet.</p>
    {% endfor %}
  </div>
</body>
</html>
