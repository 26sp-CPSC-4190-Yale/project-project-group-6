<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | CollegeMatch</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #dbeafe, #eef2ff);
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      width: 100%;
      max-width: 430px;
      background: white;
      padding: 36px;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }

    h2 {
      text-align: center;
      color: #2563eb;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #6b7280;
      margin-bottom: 28px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 18px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
      box-sizing: border-box;
    }

    input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }

    button {
      width: 100%;
      background: #2563eb;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .signup-link {
      text-align: center;
      margin-top: 20px;
      color: #4b5563;
    }

    .signup-link a {
      color: #2563eb;
      font-weight: bold;
      text-decoration: none;
    }

    .error-box {
      background: #fee2e2;
      color: #991b1b;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 18px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <h2>Welcome Back</h2>
    <p class="subtitle">Login to continue finding your best-fit colleges.</p>

    {% if error %}
      <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" value="{{ email or '' }}" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>

      <button type="submit">Login</button>
    </form>

    <p class="signup-link">
      Don't have an account?
      <a href="{{ url_for('signup') }}">Sign Up</a>
    </p>
  </div>
</body>
</html>
